services:

  # ────────────────────────────────
  # PostgreSQL veritabanı
  # ────────────────────────────────
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB:       ticketsystemdb
      POSTGRES_USER:     ${DB_USERNAME}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      # $$VAR — Compose'un kendi interpolasyonunu atlatır;
      # shell container içinde $POSTGRES_USER / $POSTGRES_DB'yi açar.
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 5
    # Host'a port açılmıyor; yalnızca compose network üzerinden erişilebilir

  # ────────────────────────────────
  # Kafka — KRaft mode (Zookeeper'sız)
  # ────────────────────────────────
  kafka:
    image: apache/kafka:3.7.0
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    healthcheck:
      test: ["CMD-SHELL", "/opt/kafka/bin/kafka-topics.sh --bootstrap-server localhost:9092 --list"]
      interval: 15s
      timeout: 10s
      retries: 10
    # Host'a port açılmıyor; CLI testleri docker compose exec kafka üzerinden yapılır

  # ────────────────────────────────
  # Spring Boot backend
  # ────────────────────────────────
  backend:
    build: ./backend
    ports:
      - "8080:8080"
    environment:
      # application.yaml'daki değişken adları korundu (DB_URL, DB_USERNAME, DB_PASSWORD, JWT_SECRET)
      DB_URL:                  jdbc:postgresql://postgres:5432/ticketsystemdb
      DB_USERNAME:             ${DB_USERNAME}
      DB_PASSWORD:             ${DB_PASSWORD}
      JWT_SECRET:              ${JWT_SECRET}
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
    volumes:
      - uploads_data:/app/uploads
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy

  # ────────────────────────────────
  # React + Nginx frontend
  # ────────────────────────────────
  frontend:
    build: ./frontend
    ports:
      - "3000:80"
    depends_on:
      - backend

# ────────────────────────────────
# Kalıcı volume tanımları
# ────────────────────────────────
volumes:
  postgres_data:   # PostgreSQL veri dizini
  uploads_data:    # Backend dosya yükleme dizini (/app/uploads)
