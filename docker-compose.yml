services:

  # ────────────────────────────────
  # PostgreSQL veritabanı
  # ────────────────────────────────
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB:       ticketsystemdb
      POSTGRES_USER:     ${DB_USERNAME}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      # $$VAR — Compose'un kendi interpolasyonunu atlatır;
      # shell container içinde $POSTGRES_USER / $POSTGRES_DB'yi açar.
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 5
    # Host'a port açılmıyor; yalnızca compose network üzerinden erişilebilir

  # ────────────────────────────────
  # Kafka — KRaft mode (Zookeeper'sız)
  # ────────────────────────────────
  kafka:
    image: apache/kafka:3.7.0
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    healthcheck:
      test: ["CMD-SHELL", "/opt/kafka/bin/kafka-topics.sh --bootstrap-server localhost:9092 --list"]
      interval: 15s
      timeout: 10s
      retries: 10
    # Host'a port açılmıyor; CLI testleri docker compose exec kafka üzerinden yapılır

  # ────────────────────────────────
  # OpenSearch — single-node, security plugin kapalı (dev)
  # ────────────────────────────────
  opensearch:
    image: opensearchproject/opensearch:2.13.0
    environment:
      discovery.type: single-node
      DISABLE_SECURITY_PLUGIN: "true"
      OPENSEARCH_JAVA_OPTS: "-Xms512m -Xmx512m"
    ports:
      - "9200:9200"
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:9200/_cluster/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 10

  # ────────────────────────────────
  # OpenSearch Dashboards — localhost:5601
  # ────────────────────────────────
  opensearch-dashboards:
    image: opensearchproject/opensearch-dashboards:2.13.0
    ports:
      - "5601:5601"
    environment:
      OPENSEARCH_HOSTS: '["http://opensearch:9200"]'
      DISABLE_SECURITY_DASHBOARDS_PLUGIN: "true"
    depends_on:
      opensearch:
        condition: service_healthy

  # ────────────────────────────────
  # OpenTelemetry Collector
  # Backend'den OTLP HTTP (4318) ile trace alır, Jaeger'a iletir.
  # ────────────────────────────────
  otel-collector:
    image: otel/opentelemetry-collector:0.100.0
    command: ["--config=/etc/otel/config.yaml"]
    volumes:
      - ./monitoring/otel-collector-config.yaml:/etc/otel/config.yaml:ro
    depends_on:
      - jaeger
    # Host'a port açılmıyor; backend Docker ağı üzerinden otel-collector:4318'e ulaşır

  # ────────────────────────────────
  # Jaeger — dağıtık trace UI, localhost:16686
  # ────────────────────────────────
  jaeger:
    image: jaegertracing/all-in-one:1.57
    environment:
      COLLECTOR_OTLP_ENABLED: "true"
    ports:
      - "16686:16686"  # Jaeger UI
    # 4317 gRPC Collector'dan gelen OTLP için — sadece iç ağda

  # ────────────────────────────────
  # Spring Boot backend
  # ────────────────────────────────
  backend:
    build: ./backend
    ports:
      - "8080:8080"
    environment:
      # application.yaml'daki değişken adları korundu
      DB_URL:                        jdbc:postgresql://postgres:5432/ticketsystemdb
      DB_USERNAME:                   ${DB_USERNAME}
      DB_PASSWORD:                   ${DB_PASSWORD}
      JWT_SECRET:                    ${JWT_SECRET}
      KAFKA_BOOTSTRAP_SERVERS:       kafka:9092
      OPENSEARCH_HOST:               opensearch
      OPENSEARCH_PORT:               "9200"
      # OTel Collector HTTP endpoint — Collector geç kalkarsa backend crash olmaz
      OTEL_EXPORTER_OTLP_ENDPOINT:  http://otel-collector:4318/v1/traces
    volumes:
      - uploads_data:/app/uploads
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy
      opensearch:
        condition: service_healthy
      # otel-collector burada depends_on yok — Collector geç başlasa backend etkilenmez

  # ────────────────────────────────
  # React + Nginx frontend
  # ────────────────────────────────
  frontend:
    build: ./frontend
    ports:
      - "3000:80"
    depends_on:
      - backend

  # ────────────────────────────────
  # Keycloak — Identity Provider, localhost:8081
  # Dev mode: gömülü H2 DB, HTTPS zorunluluğu yok.
  # realm-export.json otomatik import edilir (--import-realm).
  # KC_HOSTNAME_STRICT=false: token iss claim host header'dan alınır.
  # ────────────────────────────────
  keycloak:
    image: quay.io/keycloak/keycloak:24.0.4
    command: ["start-dev", "--import-realm"]
    environment:
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: admin
      KC_HOSTNAME_STRICT: "false"
      KC_HTTP_PORT: 8080
    ports:
      - "8081:8080"
    volumes:
      - ./keycloak:/opt/keycloak/data/import:ro
      - keycloak_data:/opt/keycloak/data

  # ────────────────────────────────
  # Prometheus — metrics scraper, localhost:9090
  # ────────────────────────────────
  prometheus:
    image: prom/prometheus:v2.51.2
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    depends_on:
      - backend

  # ────────────────────────────────
  # Grafana — dashboard, localhost:3001
  # Frontend 3000 kullandığı için Grafana 3001'de
  # ────────────────────────────────
  grafana:
    image: grafana/grafana:10.4.2
    ports:
      - "3001:3000"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
    volumes:
      - grafana_data:/var/lib/grafana
    depends_on:
      - prometheus

# ────────────────────────────────
# Kalıcı volume tanımları
# ────────────────────────────────
volumes:
  postgres_data:   # PostgreSQL veri dizini
  uploads_data:    # Backend dosya yükleme dizini (/app/uploads)
  grafana_data:    # Grafana dashboard ve datasource ayarları
  keycloak_data:   # Keycloak gömülü H2 DB ve realm verileri
