spring:
  application:
    name: ticketsystem

  datasource:
    # PostgreSQL bağlantı bilgileri environment variable'dan okunur.
    # Eğer environment variable tanımlı değilse sağdaki varsayılan değer kullanılır.
    # Gerçek şifrenizi buraya yazmayın; .env dosyası veya IDE run config ile tanımlayın.
    url: ${DB_URL:jdbc:postgresql://localhost:5432/ticketsystemdb}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      # Flyway veritabanı şemasını yönetir.
      # Hibernate yalnızca entity-şema uyumluluğunu doğrular.
      ddl-auto: validate
    show-sql: true          # Çalışan SQL sorgularını konsolda gösterir (öğrenme için faydalı)
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true    # SQL'i girintili ve okunabilir biçimde gösterir

  flyway:
    enabled: true         # Flyway etkin; migration'lar uygulama başlatılırken otomatik uygulanır
    clean-disabled: true  # Güvenlik: flyway clean komutu devre dışı, tüm şema silme engellenir

  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
      properties:
        spring.json.add.type.headers: false  # Consumer type header uyuşmazlığını önler
        max.block.ms: 5000                   # Kafka down iken en fazla 5 sn bekle, sonra soft-fail
        delivery.timeout.ms: 6000
        request.timeout.ms: 3000
    consumer:
      group-id: ticket-events-consumer
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      properties:
        spring.json.trusted.packages: "com.ticketsystem.kafka"
        spring.json.value.default.type: "com.ticketsystem.kafka.TicketEvent"

server:
  port: 8080

# JWT yapılandırması — token secret ve geçerlilik süresi ortam değişkeninden okunur
jwt:
  secret:     ${JWT_SECRET}  # Zorunlu: JWT_SECRET ortam değişkeni olarak sağlanmalıdır
  expiration: 86400000       # Token geçerlilik süresi: 86.400.000 ms = 24 saat

# Swagger UI: http://localhost:8080/swagger-ui/index.html
# API Docs:   http://localhost:8080/api-docs
springdoc:
  swagger-ui:
    path: /swagger-ui.html
  api-docs:
    path: /api-docs

app:
  opensearch:
    host: ${OPENSEARCH_HOST:localhost}
    port: ${OPENSEARCH_PORT:9200}
  upload:
    dir: uploads/

# Faz 16: Actuator — sadece health, info, prometheus, metrics açık; diğerleri kapalı
management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus,metrics
  endpoint:
    health:
      show-details: always
