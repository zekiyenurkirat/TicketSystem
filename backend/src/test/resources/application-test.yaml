spring:
  datasource:
    url: jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    username: sa
    password:
    driver-class-name: org.h2.Driver

  jpa:
    hibernate:
      # Flyway kapalı olduğu için Hibernate şemayı kendisi oluşturup test sonunda siler
      ddl-auto: create-drop
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect
        format_sql: false

  flyway:
    # Gerçek DB şeması yok (H2 in-memory); Flyway migration'ları test ortamında çalıştırılmaz
    enabled: false

  kafka:
    bootstrap-servers: localhost:9092
    listener:
      # @KafkaListener container'ları test sırasında otomatik başlamaz;
      # Kafka'ya gerçek bağlantı kurulmadan context ayağa kalkar
      auto-startup: false

jwt:
  secret: test-secret-key-that-is-at-least-256-bits-long-for-hmac-sha
  expiration: 3600000

app:
  opensearch:
    host: localhost
    port: 9200
  upload:
    dir: uploads/
